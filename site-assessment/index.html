<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Northview — Site Assessment</title>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://alcdn.msauth.net/browser/2.35.0/js/msal-browser.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #152848; --red: #8B1E1E; --tan: #F5F3EE;
      --border: #D8D4CA; --body: #3A3A36; --muted: #7A786E; --white: #fff;
      --green: #1A6B3A; --amber: #B07A00; --danger-bg: #fdf0f0; --danger-border: #f0c8c8;
      --serif: 'Libre Baskerville', Georgia, serif;
      --sans: 'Source Sans 3', system-ui, sans-serif;
    }
    html, body { font-family: var(--sans); color: var(--body); background: var(--tan); height: 100%; overflow: hidden; -webkit-text-size-adjust: 100%; }
    .page { display: none; position: fixed; inset: 0; overflow: hidden; flex-direction: column; }
    .page.active { display: flex; }
    #loading-overlay { display: none; position: fixed; inset: 0; background: rgba(21,40,72,0.88); z-index: 999; align-items: center; justify-content: center; flex-direction: column; gap: 14px; }
    #loading-overlay.active { display: flex; }
    .spinner { width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.15); border-top-color: white; border-radius: 50%; animation: spin 0.75s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes spin-sm { to { transform: rotate(360deg); } }
    .spin-sm { animation: spin-sm 0.8s linear infinite; display: inline-block; }
    .loading-text { font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.65); letter-spacing: 0.1em; text-transform: uppercase; }
    .nav-bar { background: var(--white); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; min-height: 54px; flex-shrink: 0; gap: 10px; }
    .nav-logo-text { font-family: var(--serif); font-weight: 700; font-size: 13px; color: var(--navy); }
    .nav-divider { width: 1px; height: 24px; background: var(--border); }
    .nav-tool-label { font-size: 9px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); }
    .nav-spacer { flex: 1; }
    .nav-btn { background: none; border: 1px solid var(--border); font-family: var(--sans); font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--body); padding: 7px 12px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .nav-btn:hover { border-color: var(--navy); color: var(--navy); }
    .nav-btn.primary { background: var(--navy); color: white; border-color: var(--navy); }
    .nav-btn.primary:hover { background: #1e3a6a; }
    #save-status { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 5px 10px; border-radius: 2px; display: none; }
    #save-status.unsaved { display: inline-block; background: #fff8e1; color: var(--amber); border: 1px solid #f0d870; }
    #save-status.saving  { display: inline-block; background: #e8f0fe; color: var(--navy);  border: 1px solid #c5d3f0; }
    #save-status.saved   { display: inline-block; background: #e9f6ee; color: var(--green); border: 1px solid #a8d8b9; }
    #save-status.error   { display: inline-block; background: var(--danger-bg); color: var(--red); border: 1px solid var(--danger-border); }
    #page-home { background: var(--white); align-items: center; justify-content: center; padding: 24px; }
    .home-inner { border: 3px solid var(--navy); padding: 44px 40px 36px; width: 100%; max-width: 420px; display: flex; flex-direction: column; align-items: center; }
    .home-logo { width: 100%; height: auto; display: block; margin-bottom: 10px; }
    .home-logo-fallback { display: none; font-family: var(--serif); font-weight: 700; font-size: 20px; color: var(--navy); text-align: center; margin-bottom: 4px; }
    .home-sub { font-size: 9px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: var(--red); text-align: center; margin-bottom: 32px; }
    .home-field-label { font-size: 9px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; display: block; width: 100%; }
    .home-select { width: 100%; font-family: var(--sans); font-size: 14px; font-weight: 600; padding: 13px 36px 13px 14px; border-radius: 0; appearance: none; -webkit-appearance: none; cursor: pointer; outline: none; display: block; color: var(--navy); border: 1px solid var(--border); background: var(--tan) url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%23152848' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E") no-repeat right 13px center; margin-bottom: 10px; }
    .home-open-btn, .home-signin-btn { width: 100%; background: var(--navy); color: white; border: none; font-family: var(--sans); font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; padding: 14px; cursor: pointer; transition: background 0.15s; appearance: none; }
    .home-open-btn:hover, .home-signin-btn:hover { background: #1e3a6a; }
    .home-open-btn:disabled { background: var(--border); cursor: default; }
    #home-auth-area, #home-job-area { width: 100%; }
    #home-job-area { display: none; }
    .home-user-row { margin-top: 14px; font-size: 11px; color: var(--muted); display: flex; align-items: center; justify-content: space-between; width: 100%; }
    .home-signout { background: none; border: none; font-family: var(--sans); font-size: 11px; color: var(--muted); cursor: pointer; text-decoration: underline; }
    .home-error { margin-top: 12px; font-size: 12px; color: var(--red); background: var(--danger-bg); border: 1px solid var(--danger-border); padding: 10px 14px; width: 100%; display: none; }
    .door-count-row { display: flex; gap: 6px; width: 100%; margin-bottom: 10px; }
    .door-count-btn { flex: 1; background: var(--tan); border: 1.5px solid var(--border); font-family: var(--sans); font-size: 13px; font-weight: 700; color: var(--muted); padding: 11px; cursor: pointer; transition: all 0.15s; text-align: center; }
    .door-count-btn.active { background: var(--navy); border-color: var(--navy); color: white; }
    #page-assess { background: var(--tan); }
    .assess-body { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 10px; -webkit-overflow-scrolling: touch; }
    #completeness-bar { background: var(--white); border: 2px solid var(--border); padding: 14px 16px; display: flex; align-items: center; gap: 14px; flex-shrink: 0; position: sticky; top: 0; z-index: 10; }
    #completeness-bar.complete { border-color: var(--green); background: #e9f6ee; }
    #completeness-bar.incomplete { border-color: var(--red); background: var(--danger-bg); }
    .completeness-icon { flex-shrink: 0; width: 28px; height: 28px; }
    .completeness-label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
    .completeness-label.complete { color: var(--green); }
    .completeness-label.incomplete { color: var(--red); }
    .completeness-missing { font-size: 11px; color: var(--red); margin-top: 2px; }
    .completeness-ok { font-size: 11px; color: var(--green); margin-top: 2px; }
    .completeness-right { margin-left: auto; font-size: 20px; font-weight: 700; font-family: var(--serif); color: var(--navy); }
    .sa-section { background: var(--white); border: 1px solid var(--border); }
    .sa-section-hdr { background: var(--tan); border-bottom: 1px solid var(--border); padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; }
    .sa-section-title { font-size: 9px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--navy); }
    .sa-section-status { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
    .sa-section-status.ok { color: var(--green); }
    .sa-section-status.missing { color: var(--red); }
    .door-card { border-bottom: 1px solid var(--border); padding: 12px 15px; }
    .door-card:last-child { border-bottom: none; }
    .door-card-title { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--navy); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
    .door-complete-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); flex-shrink: 0; transition: background 0.2s; }
    .door-complete-dot.ok { background: var(--green); }
    .door-complete-dot.missing { background: var(--red); }
    .meas-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 8px; }
    .meas-field { display: flex; flex-direction: column; gap: 3px; }
    .meas-label { font-size: 9px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
    .meas-input { font-family: var(--sans); font-size: 15px; font-weight: 700; color: var(--navy); background: var(--tan); border: 1.5px solid var(--border); padding: 9px 10px; width: 100%; outline: none; border-radius: 0; transition: border-color 0.15s; -webkit-appearance: none; }
    .meas-input:focus { border-color: var(--navy); background: white; }
    .meas-input.required-empty { border-color: #e8a0a0; background: #fff8f8; }
    .meas-input::placeholder { color: var(--border); font-weight: 400; font-size: 13px; }
    .meas-unit { font-size: 9px; color: var(--muted); text-align: right; margin-top: 2px; }
    .track-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-top: 1px solid var(--border); margin-top: 4px; }
    .track-label { font-size: 9px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
    .track-select { flex: 1; font-family: var(--sans); font-size: 13px; font-weight: 600; color: var(--navy); background: var(--tan) url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%237A786E' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E") no-repeat right 10px center; border: 1.5px solid var(--border); padding: 8px 28px 8px 10px; outline: none; border-radius: 0; appearance: none; -webkit-appearance: none; min-height: 38px; }
    .track-badge { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 4px 9px; flex-shrink: 0; }
    .track-badge.standard { background: #e9f6ee; color: var(--green); border: 1px solid #a8d8b9; }
    .track-badge.low { background: #fff8e1; color: var(--amber); border: 1px solid #f0d870; }
    .track-badge.ext { background: var(--danger-bg); color: var(--red); border: 1px solid var(--danger-border); }
    .track-badge.na { background: var(--tan); color: var(--muted); border: 1px solid var(--border); }
    .track-auto-note { font-size: 10px; color: var(--green); font-style: italic; margin-top: 4px; }
    .check-grid { padding: 10px 15px 14px; display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
    .check-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-top: 1px solid var(--border); cursor: pointer; }
    .check-item:nth-child(-n+2) { border-top: none; }
    .check-box { width: 20px; height: 20px; border: 2px solid var(--border); background: var(--tan); flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; cursor: pointer; }
    .check-box.checked { background: var(--navy); border-color: var(--navy); }
    .check-box-mark { color: white; font-size: 12px; line-height: 1; display: none; }
    .check-box.checked .check-box-mark { display: block; }
    .check-text { font-size: 12px; font-weight: 600; color: var(--body); line-height: 1.3; }
    .check-sub { font-size: 10px; color: var(--muted); font-weight: 400; }
    /* Photo rows */
    .photo-list { display: flex; flex-direction: column; }
    .photo-row { display: flex; align-items: center; border-top: 1px solid var(--border); min-height: 52px; }
    .photo-row:first-child { border-top: none; }
    .photo-thumb-wrap { width: 60px; height: 52px; flex-shrink: 0; background: var(--tan); overflow: hidden; display: flex; align-items: center; justify-content: center; border-right: 1px solid var(--border); }
    .photo-thumb { width: 60px; height: 52px; object-fit: cover; display: none; }
    .photo-thumb-ph { font-size: 20px; line-height: 1; color: var(--border); }
    .photo-row-label { flex: 1; font-size: 12px; font-weight: 600; color: var(--body); padding: 0 12px; line-height: 1.3; }
    .photo-pill { font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 3px 8px; white-space: nowrap; flex-shrink: 0; }
    .photo-pill.none    { color: var(--border); }
    .photo-pill.pending { color: var(--amber); background: #fff8e1; border: 1px solid #f0d870; }
    .photo-pill.ok      { color: var(--green); background: #e9f6ee; border: 1px solid #a8d8b9; }
    .photo-pill.error   { color: var(--red); background: var(--danger-bg); border: 1px solid var(--danger-border); }
    .photo-cam-btn { flex-shrink: 0; background: none; border: none; border-left: 1px solid var(--border); padding: 0 15px; height: 52px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--navy); transition: background 0.15s; }
    .photo-cam-btn:hover { background: var(--tan); }
    .photo-cam-btn.uploading { color: var(--muted); pointer-events: none; }
    .photo-file-input { display: none; }
    .notes-pad { padding: 12px 15px; }
    .notes-pad textarea { font-family: var(--sans); font-size: 13px; color: var(--body); background: var(--tan); border: 1.5px solid var(--border); padding: 10px 12px; width: 100%; outline: none; border-radius: 0; resize: none; height: 120px; line-height: 1.6; font-weight: 400; transition: border-color 0.15s; }
    .notes-pad textarea:focus { border-color: var(--navy); background: white; }
    .notes-pad textarea::placeholder { color: var(--border); }
    #offline-toast { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); background: var(--red); color: white; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 10px 18px; white-space: nowrap; display: none; z-index: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.18); }
    #offline-toast.visible { display: block; }
    #retry-banner { display: none; background: #fff8e1; border: 1px solid #f0d870; padding: 10px 14px; font-size: 11px; color: var(--amber); font-weight: 600; flex-shrink: 0; align-items: center; gap: 10px; }
    #retry-banner.visible { display: flex; }
    .retry-btn { margin-left: auto; background: none; border: 1px solid var(--amber); font-family: var(--sans); font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--amber); padding: 5px 12px; cursor: pointer; white-space: nowrap; }
    .retry-btn:hover { background: var(--amber); color: white; }
  </style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">Loading…</div>
</div>
<div id="offline-toast">No connection — data saved locally</div>
<div id="camera-inputs"></div>

<!-- HOME -->
<div class="page active" id="page-home">
  <div class="home-inner">
    <img class="home-logo" src="../Primary-Logo-Northview.png" alt="Northview Doors and Systems"
      onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
    <div class="home-logo-fallback">Northview Doors &amp; Systems</div>
    <div class="home-sub">Site Assessment</div>
    <div id="home-auth-area">
      <button class="home-signin-btn" onclick="signIn()">Sign In with Microsoft</button>
      <div class="home-error" id="home-error"></div>
    </div>
    <div id="home-job-area">
      <span class="home-field-label">Select Job</span>
      <select class="home-select" id="job-select" onchange="onJobSelect()">
        <option value="">— Select a job folder —</option>
      </select>
      <span class="home-field-label" style="margin-top:12px">Number of Doors</span>
      <div class="door-count-row">
        <button class="door-count-btn active" id="dc-1" onclick="setDoorCount(1)">1</button>
        <button class="door-count-btn" id="dc-2" onclick="setDoorCount(2)">2</button>
        <button class="door-count-btn" id="dc-3" onclick="setDoorCount(3)">3</button>
      </div>
      <button class="home-open-btn" id="open-btn" onclick="openJob()" disabled>Open Assessment</button>
      <div class="home-user-row">
        <span id="home-user-name"></span>
        <button class="home-signout" onclick="signOut()">Sign out</button>
      </div>
      <div class="home-error" id="home-error-job"></div>
    </div>
  </div>
</div>

<!-- ASSESSMENT -->
<div class="page" id="page-assess">
  <div class="nav-bar">
    <div style="display:flex;flex-direction:column;line-height:1.2">
      <span class="nav-logo-text">Northview</span>
      <span class="nav-tool-label">Site Assessment</span>
    </div>
    <div class="nav-divider"></div>
    <div style="display:flex;flex-direction:column;line-height:1.2">
      <span style="font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted)" id="nav-job-id"></span>
      <span style="font-size:12px;font-weight:700;color:var(--navy)" id="nav-customer"></span>
    </div>
    <div class="nav-spacer"></div>
    <span id="save-status"></span>
    <button class="nav-btn primary" onclick="saveAssessment()">Save</button>
    <button class="nav-btn" onclick="goHome()">Jobs</button>
  </div>
  <div id="retry-banner">
    <span>Save failed — data preserved locally</span>
    <button class="retry-btn" onclick="retrySave()">Retry Now</button>
  </div>
  <div class="assess-body" id="assess-body">
    <div id="completeness-bar" class="incomplete">
      <svg class="completeness-icon" viewBox="0 0 28 28" fill="none">
        <circle cx="14" cy="14" r="12" stroke="#D8D4CA" stroke-width="2" fill="none"/>
        <circle id="comp-arc" cx="14" cy="14" r="12" stroke="#8B1E1E" stroke-width="2.5" fill="none"
          stroke-linecap="round" stroke-dasharray="75.4" stroke-dashoffset="75.4"
          transform="rotate(-90 14 14)" style="transition:stroke-dashoffset 0.4s,stroke 0.4s"/>
      </svg>
      <div style="flex:1;min-width:0">
        <div id="comp-label" class="completeness-label incomplete">Measurements Incomplete</div>
        <div id="comp-detail" class="completeness-missing">Fill all required measurements before leaving the site.</div>
      </div>
      <div class="completeness-right" id="comp-pct">0%</div>
    </div>
    <div id="door-sections"></div>
    <div class="sa-section">
      <div class="sa-section-hdr">
        <span class="sa-section-title">Site Conditions</span>
      </div>
      <div class="check-grid" id="site-cond-grid"></div>
    </div>
    <div class="sa-section">
      <div class="sa-section-hdr">
        <span class="sa-section-title">Site Photos</span>
        <span class="sa-section-status" id="photo-status"></span>
      </div>
      <div class="photo-list" id="photo-list"></div>
    </div>
    <div class="sa-section">
      <div class="sa-section-hdr">
        <span class="sa-section-title">Field Notes</span>
      </div>
      <div class="notes-pad">
        <textarea id="field-notes" placeholder="Anything unusual — low ceiling, beam, header condition, masonry, electrical location, customer concerns…" oninput="onDataChange()"></textarea>
      </div>
    </div>
    <div style="height:40px;flex-shrink:0"></div>
  </div>
</div>

<script>
const CLIENT_ID     = '1ad6edd0-985a-4202-81d2-a24d737936f9';
const REDIRECT_URI  = 'https://northviewdoorsystems.github.io/showroom/site-assessment/';
const BASE_SEGMENTS = ['Documents','For-Profit Ventures','Northview Doors& Systems','Reference','Northview-Showroom'];
const SCOPES        = ['Files.ReadWrite'];

let msalInstance;
try {
  msalInstance = new msal.PublicClientApplication({
    auth: { clientId: CLIENT_ID, authority: 'https://login.microsoftonline.com/common', redirectUri: REDIRECT_URI },
    cache: { cacheLocation: 'sessionStorage', storeAuthStateInCookie: true }
  });
} catch(e) {
  document.addEventListener('DOMContentLoaded', () => {
    const el = document.getElementById('home-error');
    if (el) { el.textContent = 'Init error: ' + e.message; el.style.display = 'block'; }
  });
}

function trackFromHeadroom(inches) {
  if (inches === null || isNaN(inches)) return { label: '—', type: 'na' };
  if (inches >= 10)   return { label: 'Standard Radius',                     type: 'standard' };
  if (inches >= 6.25) return { label: 'Low-Clearance Radius',                type: 'low' };
  if (inches >= 4.75) return { label: 'Ext. Low-Clearance (Hi-Lift option)', type: 'ext' };
  return                     { label: 'Not Feasible (<4.75")',                type: 'ext' };
}

const SITE_CONDITIONS = [
  { id:'jamb_wood',     label:'Wood Jamb',             sub:'Standard install' },
  { id:'jamb_steel',    label:'Steel Jamb',            sub:'May need adapters' },
  { id:'jamb_masonry',  label:'Masonry / Brick',       sub:'Surcharge applies' },
  { id:'header_good',   label:'Header — Good',         sub:'No repair needed' },
  { id:'header_repair', label:'Header — Needs Repair', sub:'Flag for scope' },
  { id:'floor_level',   label:'Floor Level',           sub:'' },
  { id:'floor_uneven',  label:'Floor Uneven',          sub:'Shim / threshold work' },
  { id:'outlet_ok',     label:'Outlet in Reach',       sub:'Opener-ready' },
  { id:'outlet_needed', label:'No Outlet',             sub:'Electrical required' },
  { id:'ceiling_clear', label:'Ceiling Clear',         sub:'No obstructions' },
  { id:'beam_post',     label:'Beam / Post',           sub:'May affect spring placement' },
  { id:'painted_over',  label:'Old Door Painted Over', sub:'Removal may be harder' },
];

const PHOTO_ITEMS = [
  { id:'photo_exterior', label:'Exterior — straight-on from driveway', filename:'photo_exterior.jpg' },
  { id:'photo_interior', label:'Interior — full view (headroom + side)', filename:'photo_interior.jpg' },
  { id:'photo_track',    label:'Existing track & hardware',             filename:'photo_track.jpg' },
  { id:'photo_header',   label:'Header close-up',                       filename:'photo_header.jpg' },

let S = {
  jobId: null, doorCount: 1, assessment: null,
  pendingSave: false, _autoSaveTimer: null,
  photoStatus: {}, photoQueue: [], photoUploading: false,
};

function localKey() { return 'sa_draft_' + S.jobId; }
function saveLocal() { try { localStorage.setItem(localKey(), JSON.stringify({ ts: Date.now(), data: S.assessment })); } catch(e) {} }
function loadLocal() { try { const r = localStorage.getItem(localKey()); return r ? JSON.parse(r) : null; } catch(e) { return null; } }

async function getToken() {
  const acct = msalInstance.getActiveAccount() || msalInstance.getAllAccounts()[0];
  if (!acct) throw new Error('Not signed in');
  try { return (await msalInstance.acquireTokenSilent({ scopes: SCOPES, account: acct })).accessToken; }
  catch(e) { if (e instanceof msal.InteractionRequiredAuthError) await msalInstance.acquireTokenRedirect({ scopes: SCOPES }); throw e; }
}
async function signIn() {
  try { if (!msalInstance) throw new Error('MSAL did not initialize.'); await msalInstance.loginRedirect({ scopes: SCOPES }); }
  catch(e) { const el = document.getElementById('home-error'); el.textContent = 'Sign-in error: ' + e.message; el.style.display = 'block'; }
}
async function signOut() { await msalInstance.logoutRedirect({ postLogoutRedirectUri: REDIRECT_URI }); }

function drivePath() {
  const segs = Array.from(arguments);
  return '/me/drive/root:/' + [...BASE_SEGMENTS, ...segs].map(encodeURIComponent).join('/');
}
async function graphFetch(path) {
  const token = await getToken();
  const r = await fetch('https://graph.microsoft.com/v1.0' + path, { headers: { Authorization: 'Bearer ' + token } });
  if (!r.ok) { if (r.status === 404) return null; throw new Error('Graph ' + r.status); }
  return r.json();
}
async function graphPutJSON(path, body) {
  const token = await getToken();
  const r = await fetch('https://graph.microsoft.com/v1.0' + path + ':/content', {
    method: 'PUT', headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error('Graph PUT ' + r.status);
  return r.json();
}
async function graphPutBinary(path, blob) {
  const token = await getToken();
  const r = await fetch('https://graph.microsoft.com/v1.0' + path + ':/content', {
    method: 'PUT', headers: { Authorization: 'Bearer ' + token, 'Content-Type': blob.type || 'image/jpeg' },
    body: blob
  });
  if (!r.ok) throw new Error('Graph PUT binary ' + r.status);
  return r.json();
}

(async () => {
  try {
    const resp = await msalInstance.handleRedirectPromise();
    if (resp) msalInstance.setActiveAccount(resp.account);
    if (msalInstance.getAllAccounts().length > 0) await loadJobs(msalInstance.getAllAccounts()[0]);
    else showPage('home');
  } catch(e) { showPage('home'); }
})();

async function loadJobs(account) {
  showLoading('Loading jobs…'); showPage('home');
  try {
    const data = await graphFetch(drivePath() + ':/children?$select=name,folder&$orderby=name%20desc');
    const jobs = (data && data.value || []).filter(function(i){ return i.folder && /^NV-/i.test(i.name); }).map(function(i){ return i.name; });
    const sel = document.getElementById('job-select');
    jobs.forEach(function(j){ const o = document.createElement('option'); o.value = o.textContent = j; sel.appendChild(o); });
    document.getElementById('home-user-name').textContent = account.name || account.username;
    document.getElementById('home-auth-area').style.display = 'none';
    document.getElementById('home-job-area').style.display = 'block';
  } catch(e) { const el = document.getElementById('home-error'); el.textContent = e.message; el.style.display = 'block'; }
  hideLoading();
}

function onJobSelect() { document.getElementById('open-btn').disabled = !document.getElementById('job-select').value; }
function setDoorCount(n) {
  S.doorCount = n;
  [1,2,3].forEach(function(i){ document.getElementById('dc-'+i).classList.toggle('active', i === n); });
}

async function openJob() {
  const jobId = document.getElementById('job-select').value;
  if (!jobId) return;
  S.jobId = jobId; S.photoStatus = {}; S.photoQueue = [];
  showLoading('Loading assessment…');
  let existing = null;
  try {
    const token = await getToken();
    const cr = await fetch('https://graph.microsoft.com/v1.0' + drivePath(jobId, 'site_assessment.json') + ':/content', { headers: { Authorization: 'Bearer ' + token } });
    if (cr.ok) existing = await cr.json();
  } catch(e) {}
  const local = loadLocal();
  if (local && (!existing || local.ts > (existing._savedAt || 0))) existing = local.data;
  const doorCount = (existing && existing.doorCount) || S.doorCount;
  S.doorCount = doorCount;
  S.assessment = existing || buildBlank(jobId, doorCount);
  S.assessment.jobId = jobId;
  S.pendingSave = false;
  PHOTO_ITEMS.forEach(function(p){ S.photoStatus[p.id] = (S.assessment.photos && S.assessment.photos[p.id]) ? 'ok' : 'none'; });
  hideLoading();
  buildCameraInputs();
  renderAssessment();
  showPage('assess');
}

function buildBlank(jobId, doorCount) {
  const doors = [];
  for (let i = 0; i < doorCount; i++) doors.push({ width:'', height:'', headroom:'', backroom:'', sideleft:'', sideright:'', trackOverride:'' });
  const conditions = {}; SITE_CONDITIONS.forEach(function(c){ conditions[c.id] = false; });
  const photos = {}; PHOTO_ITEMS.forEach(function(p){ photos[p.id] = false; });
  return { jobId: jobId, doorCount: doorCount, doors: doors, conditions: conditions, photos: photos, notes: '', _savedAt: null };
}

function goHome() {
  if (S.pendingSave || S.photoQueue.length > 0) {
    if (!confirm('Unsaved changes or photos pending upload.\n\nLeave anyway? Data is preserved locally.')) return;
  }
  showPage('home');
}

// ── Camera inputs ──────────────────────────────────────────────
function buildCameraInputs() {
  const container = document.getElementById('camera-inputs');
  container.innerHTML = '';
  PHOTO_ITEMS.forEach(function(item) {
    const input = document.createElement('input');
    input.type = 'file'; input.accept = 'image/*'; input.capture = 'environment';
    input.className = 'photo-file-input'; input.id = 'cam-input-' + item.id;
    input.addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) onPhotoSelected(item.id, file);
      input.value = '';
    });
    container.appendChild(input);
  });
}

function triggerCamera(photoId) { const el = document.getElementById('cam-input-' + photoId); if (el) el.click(); }

// ── Photo capture & upload ──────────────────────────────────────
function onPhotoSelected(photoId, file) {
  // Show thumbnail immediately — no waiting for upload
  const thumb = document.getElementById('thumb-' + photoId);
  const ph = document.getElementById('thumb-ph-' + photoId);
  if (thumb) { thumb.src = URL.createObjectURL(file); thumb.style.display = 'block'; }
  if (ph) ph.style.display = 'none';

  // Mark taken in state and save JSON
  if (!S.assessment.photos) S.assessment.photos = {};
  S.assessment.photos[photoId] = true;
  onDataChange();

  // Queue upload (replace any existing entry for same slot — retake)
  S.photoStatus[photoId] = 'pending';
  updatePhotoPill(photoId);
  S.photoQueue = S.photoQueue.filter(function(q){ return q.photoId !== photoId; });
  S.photoQueue.push({ photoId: photoId, file: file });
  updatePhotoSectionStatus();
  drainPhotoQueue();
}

async function drainPhotoQueue() {
  if (S.photoUploading || S.photoQueue.length === 0) return;
  S.photoUploading = true;
  while (S.photoQueue.length > 0) {
    const entry = S.photoQueue[0];
    const item = PHOTO_ITEMS.find(function(p){ return p.id === entry.photoId; });
    if (!item) { S.photoQueue.shift(); continue; }
    setCamBtnState(entry.photoId, true);
    S.photoStatus[entry.photoId] = 'uploading';
    updatePhotoPill(entry.photoId);
    try {
      await graphPutBinary(drivePath(S.jobId, item.filename), entry.file);
      S.photoQueue.shift();
      S.photoStatus[entry.photoId] = 'ok';
      updatePhotoPill(entry.photoId);
    } catch(e) {
      S.photoStatus[entry.photoId] = 'error';
      updatePhotoPill(entry.photoId);
      showOfflineToast();
      break;
    }
    setCamBtnState(entry.photoId, false);
  }
  S.photoUploading = false;
  updatePhotoSectionStatus();
}

function updatePhotoPill(photoId) {
  const pill = document.getElementById('pill-' + photoId);
  if (!pill) return;
  const st = S.photoStatus[photoId] || 'none';
  const labels = { none:'—', pending:'Queued', uploading:'Uploading', ok:'Saved', error:'Retry' };
  pill.textContent = labels[st] || st;
  pill.className = 'photo-pill ' + (st === 'uploading' ? 'pending' : st);
}

function setCamBtnState(photoId, uploading) {
  const btn = document.getElementById('cam-btn-' + photoId);
  if (!btn) return;
  btn.classList.toggle('uploading', uploading);
  btn.innerHTML = uploading ? spinnerIcon() : cameraIcon();
}

function cameraIcon() {
  return '<svg width="22" height="20" viewBox="0 0 22 20" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7.5 3L6 5H3a2 2 0 00-2 2v10a2 2 0 002 2h16a2 2 0 002-2V7a2 2 0 00-2-2h-3l-1.5-2h-7z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><circle cx="11" cy="11" r="3" stroke="currentColor" stroke-width="1.5"/></svg>';
}
function spinnerIcon() {
  return '<svg class="spin-sm" width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="7" stroke="#D8D4CA" stroke-width="2"/><path d="M9 2a7 7 0 017 7" stroke="#7A786E" stroke-width="2" stroke-linecap="round"/></svg>';
}

// ── Render ──────────────────────────────────────────────────────
function renderAssessment() {
  const a = S.assessment;
  document.getElementById('nav-job-id').textContent = a.jobId || '';
  document.getElementById('nav-customer').textContent = a.jobId || '';
  const container = document.getElementById('door-sections');
  container.innerHTML = '';
  a.doors.forEach(function(door, idx){ container.appendChild(buildDoorSection(door, idx)); });
  renderCheckGrid();
  renderPhotoList();

function renderPhotoList() {
  const list = document.getElementById('photo-list');
  list.innerHTML = '';
  PHOTO_ITEMS.forEach(function(item) {
    const taken = S.assessment.photos && S.assessment.photos[item.id];
    const st = S.photoStatus[item.id] || 'none';
    const labels = { none:'—', pending:'Queued', uploading:'Uploading', ok:'Saved', error:'Retry' };
    const row = document.createElement('div');
    row.className = 'photo-row';
    row.innerHTML =
      '<div class="photo-thumb-wrap">' +
        '<img class="photo-thumb" id="thumb-' + item.id + '" style="display:' + (taken ? 'block' : 'none') + '" src="" alt="">' +
        '<span class="photo-thumb-ph" id="thumb-ph-' + item.id + '" style="display:' + (taken ? 'none' : 'flex') + '">&#128247;</span>' +
      '</div>' +
      '<div class="photo-row-label">' + item.label + '</div>' +
      '<span class="photo-pill ' + (st === 'uploading' ? 'pending' : st) + '" id="pill-' + item.id + '">' + (labels[st] || '—') + '</span>' +
      '<button class="photo-cam-btn" id="cam-btn-' + item.id + '" onclick="triggerCamera(\'' + item.id + '\')" title="Take photo">' + cameraIcon() + '</button>';
    list.appendChild(row);
  });
  updatePhotoSectionStatus();
}

function updatePhotoSectionStatus() {
  const taken = Object.values(S.assessment.photos || {}).filter(Boolean).length;
  const total = PHOTO_ITEMS.length;
  const pending = S.photoQueue.length;
  const st = document.getElementById('photo-status');
  if (!st) return;
  if (pending > 0) {
    st.textContent = taken + '/' + total + ' — ' + pending + ' uploading';
    st.className = 'sa-section-status'; st.style.color = 'var(--amber)';
  } else {
    st.textContent = taken + ' / ' + total;
    st.className = 'sa-section-status' + (taken === total ? ' ok' : ''); st.style.color = '';
  }
}

// ── Door sections ───────────────────────────────────────────────
function buildDoorSection(door, idx) {
  const sec = document.createElement('div');
  sec.className = 'sa-section'; sec.id = 'door-sec-' + idx;
  const fields = [
    { key:'width',     label:'Width',        placeholder:"16'0\"",  unit:'ft – in' },
    { key:'height',    label:'Height',       placeholder:"7'0\"",   unit:'ft – in' },
    { key:'headroom',  label:'Headroom',     placeholder:'12"',     unit:'inches' },
    { key:'backroom',  label:'Backroom',     placeholder:"18'0\"",  unit:'ft – in' },
    { key:'sideleft',  label:'Side — Left',  placeholder:'3.5"',    unit:'inches' },
    { key:'sideright', label:'Side — Right', placeholder:'3.5"',    unit:'inches' },
  ];
  const allFilled = fields.every(function(f){ return door[f.key] && door[f.key].trim(); });
  const measHtml = fields.map(function(f) {
    const empty = !door[f.key] || !door[f.key].trim();
    return '<div class="meas-field">' +
      '<div class="meas-label">' + f.label + '</div>' +
      '<input class="meas-input' + (empty ? ' required-empty' : '') + '" id="meas-' + idx + '-' + f.key + '" type="text" inputmode="decimal" placeholder="' + f.placeholder + '" value="' + escHtml(door[f.key] || '') + '" oninput="onMeasInput(' + idx + ',\'' + f.key + '\',this.value)">' +
      '<div class="meas-unit">' + f.unit + '</div></div>';
  }).join('');
  sec.innerHTML =
    '<div class="sa-section-hdr">' +
      '<span class="sa-section-title">Door ' + (idx+1) + ' — Measurements</span>' +
      '<span class="sa-section-status ' + (allFilled?'ok':'missing') + '" id="door-status-' + idx + '">' + (allFilled ? '&#10003; Complete' : 'Required') + '</span>' +
    '</div>' +
    '<div class="door-card">' +
      '<div class="door-card-title"><span class="door-complete-dot ' + (allFilled?'ok':'missing') + '" id="door-dot-' + idx + '"></span>Rough Opening &amp; Space</div>' +
      '<div class="meas-grid">' + measHtml + '</div>' +
      '<div class="track-row">' +
        '<div class="track-label">Track Solution</div>' +
        '<select class="track-select" id="track-select-' + idx + '" onchange="onTrackOverride(' + idx + ',this.value)">' + buildTrackOptions(door) + '</select>' +
        '<span class="track-badge ' + getTrackBadgeType(door) + '" id="track-badge-' + idx + '">' + getTrackBadgeLabel(door) + '</span>' +
      '</div>' +
      '<div id="track-auto-note-' + idx + '" class="track-auto-note" style="display:' + (door.headroom && !door.trackOverride ? 'block' : 'none') + '">Auto-suggested from headroom</div>' +
    '</div>';
  return sec;
}

function buildTrackOptions(door) {
  const auto = headroomToInches(door.headroom);
  const sug = trackFromHeadroom(auto);
  const opts = [
    { value:'',         label: door.headroom ? 'Auto: ' + sug.label : '— Enter headroom for auto-suggestion —' },
    { value:'standard', label:'Standard Radius (10"+ headroom)' },
    { value:'low',      label:'Low-Clearance Radius (6.25"–9.75")' },
    { value:'ext',      label:'Ext. Low-Clearance / Hi-Lift (4.75"–6.25")' },
    { value:'vertical', label:'Vertical Lift (no standard track)' },
    { value:'flag',     label:'Flag this job — non-standard' },
  ];
  const cur = door.trackOverride || '';
  return opts.map(function(o){ return '<option value="' + o.value + '"' + (cur === o.value ? ' selected' : '') + '>' + o.label + '</option>'; }).join('');
}

function headroomToInches(val) {
  if (!val) return null;
  const s = val.toString().trim();
  const dec = parseFloat(s.replace('"','').replace("'",''));
  if (!isNaN(dec) && dec < 30) return dec;
  const ft = s.match(/(\d+)'?\s*(\d+(?:\.\d+)?)"?/);
  if (ft) return parseFloat(ft[1])*12 + parseFloat(ft[2]);
  return parseFloat(s) || null;
}
function getTrackBadgeType(door) {
  if (door.trackOverride) return door.trackOverride === 'standard' ? 'standard' : door.trackOverride === 'low' ? 'low' : 'ext';
  return trackFromHeadroom(headroomToInches(door.headroom)).type;
}
function getTrackBadgeLabel(door) {
  if (door.trackOverride) return { standard:'STD', low:'LOW', ext:'EXT', vertical:'VERT', flag:'FLAG', '':'—' }[door.trackOverride] || door.trackOverride.toUpperCase();
  return { standard:'STD', low:'LOW', ext:'EXT', na:'—' }[trackFromHeadroom(headroomToInches(door.headroom)).type] || '—';
}

function onMeasInput(idx, key, value) {
  S.assessment.doors[idx][key] = value;
  onDataChange();
  document.getElementById('meas-' + idx + '-' + key).classList.toggle('required-empty', !value.trim());
  if (key === 'headroom') updateTrackSuggestion(idx);
  updateDoorStatus(idx);
  updateCompleteness();
}
function onTrackOverride(idx, val) {
  S.assessment.doors[idx].trackOverride = val;
  onDataChange();
  const door = S.assessment.doors[idx];
  const auto = trackFromHeadroom(headroomToInches(door.headroom));
  const badge = document.getElementById('track-badge-' + idx);
  if (badge) {
    badge.className = 'track-badge ' + (val ? (val==='standard'?'standard':val==='low'?'low':'ext') : auto.type);
    badge.textContent = val ? ({standard:'STD',low:'LOW',ext:'EXT',vertical:'VERT',flag:'FLAG'}[val]||val.toUpperCase()) : ({standard:'STD',low:'LOW',ext:'EXT',na:'—'}[auto.type]||'—');
  }
  const note = document.getElementById('track-auto-note-' + idx);
  if (note) note.style.display = (!val && door.headroom) ? 'block' : 'none';
}
function updateTrackSuggestion(idx) {
  const door = S.assessment.doors[idx];
  const sel = document.getElementById('track-select-' + idx);
  if (!sel) return;
  const auto = trackFromHeadroom(headroomToInches(door.headroom));
  sel.options[0].text = door.headroom ? 'Auto: ' + auto.label : '— Enter headroom for auto-suggestion —';
  const badge = document.getElementById('track-badge-' + idx);
  if (badge && !door.trackOverride) {
    badge.className = 'track-badge ' + auto.type;
    badge.textContent = { standard:'STD', low:'LOW', ext:'EXT', na:'—' }[auto.type] || '—';
  }
  const note = document.getElementById('track-auto-note-' + idx);
  if (note) note.style.display = (door.headroom && !door.trackOverride) ? 'block' : 'none';
}
function updateDoorStatus(idx) {
  const door = S.assessment.doors[idx];
  const ok = ['width','height','headroom','backroom','sideleft','sideright'].every(function(f){ return door[f] && door[f].trim(); });
  const st = document.getElementById('door-status-' + idx);
  const dot = document.getElementById('door-dot-' + idx);
  if (st) { st.textContent = ok ? '✓ Complete' : 'Required'; st.className = 'sa-section-status ' + (ok?'ok':'missing'); }
  if (dot) dot.className = 'door-complete-dot ' + (ok?'ok':'missing');
}

// ── Checkboxes ──────────────────────────────────────────────────
function renderCheckGrid() {
  const grid = document.getElementById('site-cond-grid');
  grid.innerHTML = '';
  SITE_CONDITIONS.forEach(function(item) {
    const el = document.createElement('div');
    el.className = 'check-item';
    el.innerHTML =
      '<div class="check-box ' + (S.assessment.conditions[item.id] ? 'checked' : '') + '" id="cb-' + item.id + '" onclick="toggleCheck(\'' + item.id + '\')">' +
        '<span class="check-box-mark">&#10003;</span></div>' +
      '<div class="check-text">' + item.label + (item.sub ? '<br><span class="check-sub">' + item.sub + '</span>' : '') + '</div>';
    grid.appendChild(el);
  });
}
function toggleCheck(itemId) {
  S.assessment.conditions[itemId] = !S.assessment.conditions[itemId];
  const box = document.getElementById('cb-' + itemId);
  if (box) box.classList.toggle('checked', S.assessment.conditions[itemId]);
  onDataChange();
}

// ── Completeness ────────────────────────────────────────────────
function getMissingFields() {
  const missing = [];
  const labels = { width:'Width', height:'Height', headroom:'Headroom', backroom:'Backroom', sideleft:'Side-L', sideright:'Side-R' };
  S.assessment.doors.forEach(function(door, idx) {
    ['width','height','headroom','backroom','sideleft','sideright'].forEach(function(f) {
      if (!door[f] || !door[f].trim()) missing.push('Door ' + (idx+1) + ': ' + labels[f]);
    });
  });
  return missing;
}
function updateCompleteness() {
  const missing = getMissingFields();
  const total = S.assessment.doors.length * 6;
  const filled = total - missing.length;
  const pct = total > 0 ? Math.round(filled/total*100) : 100;
  const complete = missing.length === 0;
  document.getElementById('completeness-bar').className = complete ? 'complete' : 'incomplete';
  const lbl = document.getElementById('comp-label');
  lbl.className = 'completeness-label ' + (complete?'complete':'incomplete');
  lbl.textContent = complete ? 'All Measurements Complete' : 'Measurements Incomplete';
  const det = document.getElementById('comp-detail');
  det.className = complete ? 'completeness-ok' : 'completeness-missing';
  det.textContent = complete ? 'All required fields filled. Safe to leave the site.' : 'Missing: ' + missing.slice(0,4).join(', ') + (missing.length>4 ? ' +' + (missing.length-4) + ' more' : '');
  document.getElementById('comp-pct').textContent = pct + '%';
  const arc = document.getElementById('comp-arc');
  arc.setAttribute('stroke-dashoffset', (75.4 - pct/100*75.4).toFixed(1));
  arc.setAttribute('stroke', complete ? '#1A6B3A' : pct >= 50 ? '#B07A00' : '#8B1E1E');
}

// ── Save ────────────────────────────────────────────────────────
function onDataChange() {
  const n = document.getElementById('field-notes');
  if (n) S.assessment.notes = n.value;
  saveLocal(); S.pendingSave = true; setSaveStatus('unsaved','Unsaved');
  clearTimeout(S._autoSaveTimer);
  S._autoSaveTimer = setTimeout(function(){ saveAssessment(true); }, 2000);
}
function setSaveStatus(cls, text) {
  const el = document.getElementById('save-status');
  el.className = cls; el.textContent = text; el.style.display = 'inline-block';
}
async function saveAssessment(auto) {
  if (!S.assessment || !S.jobId) return;
  const n = document.getElementById('field-notes'); if (n) S.assessment.notes = n.value;
  setSaveStatus('saving','Saving…');
  document.getElementById('retry-banner').classList.remove('visible');
  S.assessment._savedAt = Date.now();
  try {
    await graphPutJSON(drivePath(S.jobId, 'site_assessment.json'), S.assessment);
    saveLocal(); S.pendingSave = false; setSaveStatus('saved','Saved');
    setTimeout(function(){ const el = document.getElementById('save-status'); if (el.classList.contains('saved')) el.style.display = 'none'; }, 3000);
  } catch(e) {
    saveLocal(); S.pendingSave = true; setSaveStatus('error','Save failed');
    if (!auto) document.getElementById('retry-banner').classList.add('visible');
    showOfflineToast();
  }
}
function retrySave() { document.getElementById('retry-banner').classList.remove('visible'); saveAssessment(false); }
function showOfflineToast() {
  const t = document.getElementById('offline-toast'); t.classList.add('visible');
  setTimeout(function(){ t.classList.remove('visible'); }, 4000);
}
window.addEventListener('online', function() {
  if (S.pendingSave && S.jobId) saveAssessment(true);
  if (S.photoQueue.length > 0) drainPhotoQueue();
});

// ── Helpers ─────────────────────────────────────────────────────
function showPage(name) {
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.getElementById({ home:'page-home', assess:'page-assess' }[name]).classList.add('active');
}
function showLoading(msg) { document.getElementById('loading-text').textContent = msg||'Loading…'; document.getElementById('loading-overlay').classList.add('active'); }
function hideLoading() { document.getElementById('loading-overlay').classList.remove('active'); }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
